<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT Kanji Quiz</title>

<script src="kanji_data.js"></script>
<script src="options_data.js"></script>

<style>
:root {
  --bg:      #0d0d0d;
  --surface: #161616;
  --card:    #1c1c1c;
  --border:  #2a2a2a;
  --text:    #f0f0f0;
  --muted:   #888;
  --accent:  #e8c96d;
  --accent2: #7ec8c8;
  --correct: #4caf7d;
  --wrong:   #e05c5c;
  --r:       14px;
  --jp:      "Hiragino Kaku Gothic Pro","Yu Gothic","Noto Sans JP",sans-serif;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

body {
  background:var(--bg); color:var(--text);
  font-family:var(--jp);
  min-height:100vh;
  display:flex; justify-content:center; align-items:flex-start;
  padding:24px 16px 48px;
}

.shell { width:100%; max-width:660px; display:flex; flex-direction:column; gap:16px; }

/* ── header ── */
header { display:flex; justify-content:space-between; align-items:center; }
.logo  { font-size:20px; font-weight:700; color:var(--accent); letter-spacing:.04em; }
.logo span { color:var(--text); font-weight:300; }
.review-flag { font-size:11px; color:var(--wrong); display:none; }
.review-flag.show { display:block; }

/* ── controls ── */
.ctrl-bar {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r); padding:14px 18px;
  display:flex; flex-wrap:wrap; gap:10px; align-items:center;
}
.ctrl-bar label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
select {
  background:var(--card); color:var(--text);
  border:1px solid var(--border); border-radius:8px;
  padding:7px 12px; font-size:14px; cursor:pointer;
}
.tag-btn {
  background:var(--card); color:var(--muted);
  border:1px solid var(--border); border-radius:8px;
  padding:6px 12px; font-size:13px; cursor:pointer;
  transition:border-color .15s, color .15s;
}
.tag-btn.active { border-color:var(--accent); color:var(--accent); }

/* ── stats ── */
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.stat-box  {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r); padding:12px; text-align:center;
}
.stat-box .val { font-size:26px; font-weight:700; color:var(--accent); line-height:1; }
.stat-box .lbl { font-size:11px; color:var(--muted); margin-top:4px; text-transform:uppercase; letter-spacing:.06em; }

/* ── progress ── */
.prog-track { background:var(--border); height:4px; border-radius:2px; overflow:hidden; }
.prog-fill  { height:100%; background:var(--accent); width:0%; transition:width .3s ease; border-radius:2px; }

/* ── question card ── */
.q-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r); padding:32px 24px 24px; text-align:center;
}
.q-type  { font-size:12px; color:var(--accent2); text-transform:uppercase; letter-spacing:.1em; margin-bottom:18px; }
.tag-badge {
  display:inline-block; font-size:11px; padding:2px 8px;
  border-radius:99px; border:1px solid var(--border); color:var(--muted); margin-bottom:8px;
}
.kanji-big {
  font-size:96px; line-height:1.1; margin:4px 0 16px;
  text-shadow:2px 4px 12px rgba(0,0,0,.6);
  transition:transform .15s ease;
}
.kanji-big.pulse { transform:scale(1.07); }

/* ── options ── */
.opt-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:8px; }
.opt-btn {
  background:var(--card); color:var(--text);
  border:1px solid var(--border); border-radius:var(--r);
  padding:16px 12px; font-size:17px; font-family:var(--jp);
  cursor:pointer; transition:border-color .15s, background .15s, transform .1s;
  line-height:1.4;
}
.opt-btn:hover:not(:disabled) { border-color:var(--accent); background:#222; transform:translateY(-1px); }
.opt-btn:disabled { cursor:default; }
.opt-btn.correct { background:var(--correct)!important; border-color:var(--correct)!important; color:#fff; transform:scale(1.02); }
.opt-btn.wrong   { background:var(--wrong)!important;   border-color:var(--wrong)!important;   color:#fff; }

/* ── hint ── */
.hint-area {
  min-height:26px; text-align:center; color:var(--accent);
  font-size:14px; font-style:italic; padding:6px 0;
  opacity:0; transition:opacity .3s;
}
.hint-area.show { opacity:1; }

/* ── action buttons ── */
.action-row { display:flex; justify-content:center; gap:12px; margin-top:16px; }
.action-btn {
  background:transparent; border:1px solid var(--border); color:var(--muted);
  border-radius:8px; padding:9px 20px; font-size:14px; cursor:pointer;
  transition:border-color .15s, color .15s;
}
.action-btn:hover { border-color:var(--accent); color:var(--accent); }

/* ── empty state ── */
.empty { text-align:center; padding:60px 20px; color:var(--muted); }
.empty h2 { color:var(--accent); margin-bottom:10px; }
.empty code { background:var(--card); padding:2px 6px; border-radius:4px; font-size:13px; }

/* ── responsive ── */
@media(max-width:500px){
  .kanji-big { font-size:70px; }
  .opt-grid  { grid-template-columns:1fr; }
  .stats-row { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>

<div class="shell">

  <header>
    <div class="logo">漢字 <span>Quiz</span></div>
    <div class="review-flag" id="reviewFlag">⚠ Reviewing weak kanji</div>
  </header>

  <!-- Controls -->
  <div class="ctrl-bar">
    <label>Mode</label>
    <select id="quizMode">
      <option value="reading">Reading → Hiragana</option>
      <option value="meaning">Kanji → Meaning</option>
      <option value="mixed">Mixed</option>
    </select>

    <label>Level</label>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="tag-btn active" data-tag="all">All</button>
      <button class="tag-btn" data-tag="N5">N5</button>
      <button class="tag-btn" data-tag="N4">N4</button>
      <button class="tag-btn" data-tag="N3">N3</button>
      
      
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-box"><div class="val" id="sScore">0</div><div class="lbl">Score</div></div>
    <div class="stat-box"><div class="val" id="sStreak">0</div><div class="lbl">Streak</div></div>
    <div class="stat-box"><div class="val" id="sBest">0</div><div class="lbl">Best</div></div>
    <div class="stat-box"><div class="val" id="sTotal">0</div><div class="lbl">Answered</div></div>
  </div>

  <!-- Progress bar -->
  <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>

  <!-- Question card -->
  <div class="q-card" id="qCard">
    <div class="q-type" id="qType">Choose the correct reading</div>
    <div class="tag-badge" id="tagBadge">N5</div>
    <div class="kanji-big" id="kanjiDisplay">–</div>
    <div class="hint-area" id="hintArea"></div>
    <div class="opt-grid" id="optGrid"></div>
    <div class="action-row">
      <button class="action-btn" onclick="showHint()">💡 Hint</button>
      <button class="action-btn" onclick="nextQ()">Skip →</button>
      <button class="action-btn" onclick="toggleTimedMode()">⏱ Timer</button>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────────────────────
//  Quiz engine
//  Reads from: kanjiData[]   (kanji_data.js)
//              optionsPool[] (options_data.js)
// ─────────────────────────────────────────────────────────────

let pool       = [];
let weakKanji  = [];
let current    = null;
let activeTag  = "all";
let score = 0, streak = 0, best = 0, total = 0;

// ── Utilities ─────────────────────────────────────────────────
const rand = a => a[Math.floor(Math.random() * a.length)];
const shuffle = a => {
  const b = [...a];
  for (let i = b.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [b[i],b[j]] = [b[j],b[i]];
  }
  return b;
};

// ── Build active pool from kanjiData filtered by tag ──────────
function buildPool() {
  if (!Array.isArray(window.kanjiData) || kanjiData.length === 0) return [];
  if (activeTag === "all") return [...kanjiData];
  return kanjiData.filter(k => k.tags && k.tags.includes(activeTag));
}

// ── Pick reading or meaning mode ──────────────────────────────
function getMode() {
  const v = document.getElementById("quizMode").value;
  return v === "mixed" ? (Math.random() < .5 ? "reading" : "meaning") : v;
}

// ── Generate 3 wrong options from optionsPool ─────────────────
function getWrongOptions(correct, field) {
  // Use optionsPool if available and large enough, else fall back to pool
  const source = (Array.isArray(window.optionsPool) && optionsPool.length >= 4)
    ? optionsPool
    : pool;

  const candidates = [...new Set(
    source.map(k => k[field]).filter(v => v && v !== correct)
  )];

  const picks = shuffle(candidates).slice(0, 3);

  // Fallback if not enough distinct options
  const fallbacks = ["その他","わからない","ないです","unknown"];
  while (picks.length < 3) picks.push(fallbacks[picks.length]);

  return picks;
}

// ── Load a question ───────────────────────────────────────────
function loadQ() {

  // Guard: no data loaded
  if (!Array.isArray(window.kanjiData) || kanjiData.length === 0) {
    document.getElementById("qCard").innerHTML = `
      <div class="empty">
        <h2>No kanji found</h2>
        <p>Make sure <code>kanji_data.js</code> is in the same folder as <code>index.html</code>.</p>
      </div>`;
    return;
  }

  // Guard: filtered pool too small
  if (pool.length < 2) {
    document.getElementById("qCard").innerHTML = `
      <div class="empty">
        <h2>Not enough kanji for this filter</h2>
        <p>Try selecting <strong>All</strong> or a different level.</p>
      </div>`;
    return;
  }

  // Reset hint
  const hintEl = document.getElementById("hintArea");
  hintEl.textContent = "";
  hintEl.classList.remove("show");

  // Pick question (30% chance to review a weak kanji)
  current = (weakKanji.length > 0 && Math.random() < .3)
    ? rand(weakKanji)
    : rand(pool);

  document.getElementById("reviewFlag").classList.toggle(
    "show", weakKanji.length > 0 && Math.random() < .3
  );

  const mode = getMode();
  const field = mode === "reading" ? "reading" : "meaning";
  const correct = current[field];

  // Update card UI
  document.getElementById("qType").textContent =
    mode === "reading" ? "Choose the correct reading" : "Choose the correct meaning";

  document.getElementById("tagBadge").textContent =
    (current.tags || []).join(" · ") || "–";

  // Pulse animation on kanji
  const kEl = document.getElementById("kanjiDisplay");
  kEl.textContent = current.kanji;
  kEl.classList.remove("pulse");
  void kEl.offsetWidth;
  kEl.classList.add("pulse");

  // Build 4 options: 1 correct + 3 wrong
  const wrongs  = getWrongOptions(correct, field);
  const options = shuffle([correct, ...wrongs]);

  // Render option buttons
  const grid = document.getElementById("optGrid");
  grid.innerHTML = "";
  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className   = "opt-btn";
    btn.textContent = opt;
    btn.addEventListener("click", () => checkAnswer(btn, opt, correct));
    grid.appendChild(btn);
  });
}

// ── Check answer ──────────────────────────────────────────────
function checkAnswer(btn, selected, correct) {
  document.querySelectorAll(".opt-btn").forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add("correct");
  });

  total++;

  if (selected === correct) {
    btn.classList.add("correct");
    score++; streak++;
    if (streak > best) best = streak;
  } else {
    btn.classList.add("wrong");
    streak = 0;
    if (!weakKanji.find(k => k.kanji === current.kanji)) {
    if (!weakKanji.find(k => k.kanji === current.kanji)) {
    weakKanji.push(current);
  }
}
  }

  // Update stats
  document.getElementById("sScore").textContent  = score;
  document.getElementById("sStreak").textContent = streak;
  document.getElementById("sBest").textContent   = best;
  document.getElementById("sTotal").textContent  = total;

  // Progress bar = accuracy %
  document.getElementById("progFill").style.width =
    (total > 0 ? (score/total)*100 : 0) + "%";

  setTimeout(nextQ, 1300);
}

// ── Next question ─────────────────────────────────────────────
function nextQ() { loadQ(); }

// ── Hint ──────────────────────────────────────────────────────
function showHint() {
  if (!current) return;
  const el = document.getElementById("hintArea");
  el.textContent = current.hint || "No hint for this one.";
  el.classList.add("show");
}

// ── Tag filter buttons ────────────────────────────────────────
document.querySelectorAll(".tag-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tag-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeTag = btn.dataset.tag;
    pool = shuffle(buildPool());
    loadQ();
  });
});

// ── Mode change ───────────────────────────────────────────────
document.getElementById("quizMode").addEventListener("change", loadQ);

// ── Init ──────────────────────────────────────────────────────
pool = shuffle(buildPool());
loadQ();


let timedMode = false;

function toggleTimedMode() {
  timedMode = !timedMode;
  alert(timedMode ? "Timed mode enabled" : "Timed mode disabled");
}
</script>

</body>
</html>
